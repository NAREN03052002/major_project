{% extends "base.html" %}

{% block content %}

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-lg shadow-md">

<h2 class="text-2xl font-bold mb-6">
Upload Course Resource
</h2>

<form method="POST" enctype="multipart/form-data">

<div class="mb-4">
<label class="block font-bold mb-2">Resource Title</label>
<input type="text"
name="title"
required
class="w-full border rounded px-3 py-2">
</div>

<div class="mb-6">
<label class="block font-bold mb-2">Select File</label>
<input type="file"
name="file"
required
class="w-full border rounded px-3 py-2">
</div>

<button
class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
Upload Resource
</button>

</form>

</div>

{% endblock %}
