{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto h-[85vh] flex flex-col bg-white rounded-xl shadow-2xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 flex justify-between items-center text-white">
        <div>
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                AI Academic Advisor
            </h1>
            <p class="text-indigo-100 opacity-90 mt-1">Ask me anything about any course or professor on the platform.</p>
        </div>
        <a href="{{ url_for('main.index') }}" class="text-white hover:bg-white/20 px-3 py-1 rounded transition">Exit</a>
    </div>

    <div id="chat-box" class="flex-1 bg-gray-50 p-6 overflow-y-auto space-y-6">
        <div class="flex items-start">
            <div class="bg-indigo-100 rounded-full p-2 mr-3 border border-indigo-200">
                <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
            </div>
            <div class="bg-white p-5 rounded-2xl rounded-tl-none shadow-sm border border-gray-200 max-w-lg">
                <p class="text-gray-800 font-medium">Hello! I have access to database reviews for all courses. How can I help you decide?</p>
                <div class="mt-4 grid gap-2">
                    <button onclick="fillInput('Which professor is the most lenient with grading?')" class="text-left text-sm text-indigo-600 hover:bg-indigo-50 p-2 rounded border border-indigo-100 transition">"Which professor is the most lenient with grading?"</button>
                    <button onclick="fillInput('Compare the difficulty of Java vs Python.')" class="text-left text-sm text-indigo-600 hover:bg-indigo-50 p-2 rounded border border-indigo-100 transition">"Compare the difficulty of Java vs Python."</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-white p-4 border-t">
        <form id="chat-form" class="flex gap-4 relative">
            <input type="text" id="user-input" 
                   class="flex-1 border border-gray-300 rounded-xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent shadow-sm"
                   placeholder="Type your question about any course..." autocomplete="off">
            <button type="submit" id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl px-8 py-3 font-bold transition duration-200 shadow-lg flex items-center gap-2">
                <span>Ask</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </form>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function fillInput(text) { userInput.value = text; userInput.focus(); }

    function appendMessage(text, isUser) {
        const div = document.createElement('div');
        div.className = isUser ? "flex items-end justify-end" : "flex items-start";
        const bubble = document.createElement('div');
        bubble.className = isUser 
            ? "bg-indigo-600 text-white p-4 rounded-2xl rounded-tr-none shadow-md max-w-lg text-sm md:text-base" 
            : "bg-white text-gray-800 p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-200 max-w-lg text-sm md:text-base";
        bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        div.appendChild(bubble);
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendLoading() {
        const div = document.createElement('div');
        div.id = 'loading-indicator';
        div.className = "flex items-start";
        div.innerHTML = `<div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-200"><div class="flex space-x-2 items-center"><span class="text-xs text-gray-400 font-semibold mr-2">Thinking...</span><div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div><div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div></div></div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = userInput.value.trim();
        if (!message) return;
        appendMessage(message, true);
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;
        sendBtn.classList.add('opacity-50');
        appendLoading();
        try {
            const response = await fetch("{{ url_for('main.global_chat_message') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            document.getElementById('loading-indicator').remove();
            appendMessage(data.answer || "Error: No response.", false);
        } catch (error) {
            document.getElementById('loading-indicator').remove();
            appendMessage("Connection error.", false);
        }
        userInput.disabled = false;
        sendBtn.disabled = false;
        sendBtn.classList.remove('opacity-50');
        userInput.focus();
    });
</script>
{% endblock %}
